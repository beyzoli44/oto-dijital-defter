<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hızlı Bakım Ekle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-['Inter'] min-h-screen flex justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden mt-4">

        <!-- Üst Başlık -->
        <div class="bg-slate-900 p-5 text-center">
            <h2 class="text-lg font-bold text-white tracking-wide">HIZLI BAKIM GİRİŞİ</h2>
            <p class="text-xs text-slate-400 mt-1">Sisteme yeni servis kaydı ekleyin</p>
        </div>

        <!-- Form Alanı -->
        <div class="p-6">
            <form method="POST" class="space-y-4">
                {% csrf_token %}

                <!-- Django Formunu Tailwind Uyumlu Hale Getirmek İçin Basit Bir Döngü -->
                {% for field in form %}
                    <div class="flex flex-col">
                        <label class="text-xs font-semibold text-slate-500 uppercase mb-1">{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}

                <button type="submit" class="w-full mt-6 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-lg transition duration-200">
                    Sisteme Kaydet
                </button>
            </form>
        </div>

    </div>

    <!-- Giriş kutularını otomatik stillendiren küçük bir CSS -->
    <style>
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.875rem;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>

</body>
</html>
