{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Araç Dijital Defter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex; align-items: center; justify-content: center; height: 100vh; color: white;
        }
        .card { border-radius: 20px; border: none; background: rgba(255, 255, 255, 0.95); }
        .btn-primary { background-color: #1e3c72; border: none; }
        .btn-primary:hover { background-color: #162a4d; }
        .logo-img { max-width: 180px; margin-bottom: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 text-center">

                <img src="{% static 'images/polat_oto.png' %}" alt="Polat Oto Logo" class="logo-img">
                <h2 class="mb-3">Polat Tamir & Bakım</h2>
                <p class="mb-4 text-white-50">Araçlarınızın dijital kimliği artık cebinizde.</p>

                <div class="card p-4 shadow-lg">
                    <form action="" method="GET">
                        <div class="mb-3">
                            <input type="text" name="plaka" class="form-control form-control-lg" placeholder="Plaka veya Kod Giriniz..." required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">Sorgula</button>
                    </form>

                    {% if error %}
                        <div class="alert alert-danger mt-3 mb-0" style="color: #842029; background-color: #f8d7da; border-color: #f5c2c7; border-radius: 10px;">
                            {{ error }}
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
